syntax = "proto3";

package mlregl.transport.common;

message ScalarArray {
  repeated double values = 1 [packed = true];
}

message StringArray {
  repeated string values = 1;
}

message Value {
  oneof kind {
    double number_value = 2;
    string string_value = 3;
    ScalarArray number_array_value = 4;
    bool bool_value = 6;
    StringArray string_array_value = 7;
  }
}
