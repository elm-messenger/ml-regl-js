syntax = "proto3";

package mlregl.transport.render;

message ScalarArray {
  repeated double values = 1 [packed = true];
}

message StringArray {
  repeated string values = 1;
}

message Camera {
  double x = 1;
  double y = 2;
  double zoom = 3;
  double rotation = 4;
}

message ProgramCallField {
  string key = 1;
  oneof value {
    double number_value = 2;
    string string_value = 3;
    ScalarArray number_array_value = 4;
    bytes binary_value = 5;
    bool bool_value = 6;
    StringArray string_array_value = 7;
  }
}

message AtomicRenderable {
  repeated ProgramCallField fields = 1;
}

message Effect {
  repeated ProgramCallField fields = 1;
}

message GroupRenderable {
  repeated Effect effects = 1;
  repeated Renderable children = 2;
  Camera camera = 3;
}

message Renderable {
  oneof kind {
    AtomicRenderable atomic = 1;
    GroupRenderable group = 2;
  }
}

message RenderFrame {
  Renderable root = 1;
}
